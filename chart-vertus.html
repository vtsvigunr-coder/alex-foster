<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vertus 2025 Return — animated</title>
<style>
  :root { --pink:#ff2d8e; --pink-soft:#ff4fa0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #000;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .vc-card {
    position: relative;
    width: 680px; max-width: 100%;
    background: #0a0a0c;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 28px;
    padding: 40px 44px 32px;
    color: #fff;
  }

  .vc-head { display: flex; justify-content: space-between; align-items: flex-start; }
  .vc-title { font-size: 22px; letter-spacing: 0.18em; font-weight: 600; color: #8a8a90; text-transform: uppercase; }
  .vc-sub   { margin-top: 12px; font-size: 22px; color: #cfcfd4; font-weight: 400; }
  .vc-big   { font-size: 42px; font-weight: 800; color: var(--pink); line-height: 1; font-variant-numeric: tabular-nums; }

  .vc-legend { display: flex; gap: 32px; align-items: center; margin: 26px 0 8px; font-size: 22px; color: #d8d8dc; }
  .vc-legend .lg { display: flex; align-items: center; gap: 14px; }
  .vc-legend .swatch { width: 44px; height: 4px; border-radius: 2px; }
  .vc-legend .sw-pink { background: var(--pink); }
  .vc-legend .sw-sp   { background: repeating-linear-gradient(90deg,#7a7a80 0 8px,transparent 8px 14px); }
  .vc-legend .sw-sp-label { color: #9a9aa0; }

  .vc-chart { margin-top: 14px; }
  svg { display: block; width: 100%; height: auto; }
  .axis-label { fill: #6f6f76; font-size: 20px; }

  .vertus-line {
    fill: none; stroke: var(--pink); stroke-width: 4;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .sp-line {
    fill: none; stroke: #8a8a90; stroke-width: 3;
    stroke-dasharray: 7 7; stroke-linecap: round;
  }
  .grid { stroke: rgba(255,255,255,0.06); stroke-width: 1; }
  .vertus-area { fill: var(--pink); opacity: 0.16; }
</style>
</head>
<body>
  <div class="vc-card" id="card">
    <div class="vc-head">
      <div>
        <div class="vc-title">2025 Return</div>
        <div class="vc-sub">Cumulative, live markets · full year</div>
      </div>
      <div class="vc-big" id="bigNum">+0.00%</div>
    </div>

    <div class="vc-legend">
      <span class="lg"><span class="swatch sw-pink"></span>Vertus</span>
      <span class="lg"><span class="swatch sw-sp"></span><span class="sw-sp-label">S&amp;P 500</span></span>
    </div>

    <div class="vc-chart">
      <!-- viewBox: 0..1000 wide, 0..560 tall. Plot area x:[70,980], y:[40,500] -->
      <svg viewBox="0 0 1000 560" role="img" aria-label="Cumulative 2025 return: Vertus +51.15% versus S&P 500 +17%">
        <!-- gridlines + y labels -->
        <g id="grid"></g>
        <!-- x labels -->
        <g id="xlabels"></g>

        <!-- area under vertus line, revealed left-to-right via clip -->
        <clipPath id="reveal"><rect id="revealRect" x="70" y="0" width="0" height="560"></rect></clipPath>
        <path id="area" class="vertus-area" clip-path="url(#reveal)"></path>

        <!-- S&P dashed line -->
        <path id="sp" class="sp-line" clip-path="url(#reveal)"></path>
        <!-- Vertus line -->
        <path id="vertus" class="vertus-line"></path>
      </svg>
    </div>
  </div>

<script>
(function () {
  const X0 = 70, X1 = 980, Y0 = 500, Y1 = 40;   // plot rectangle
  const VMAX = 60;                                // top of axis = 60%
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  // 13 points (Jan start .. Dec) — cumulative % return
  const vertus = [0, 4.5, 7.5, 11.5, 15, 21, 27, 31, 35.5, 40, 45.5, 48.5, 51.15];
  const sp     = [0, 1.5, 3, 2.2, 4.5, 7, 9, 10.5, 12, 13, 14.5, 16, 17];

  const sx = i => X0 + (X1 - X0) * (i / (vertus.length - 1));
  const sy = v => Y0 + (Y1 - Y0) * (v / VMAX);

  // smooth path (Catmull-Rom -> cubic bezier)
  function smooth(pts) {
    if (pts.length < 2) return "";
    let d = `M ${pts[0][0]} ${pts[0][1]}`;
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[i - 1] || pts[i];
      const p1 = pts[i], p2 = pts[i + 1];
      const p3 = pts[i + 2] || p2;
      const c1x = p1[0] + (p2[0] - p0[0]) / 6, c1y = p1[1] + (p2[1] - p0[1]) / 6;
      const c2x = p2[0] - (p3[0] - p1[0]) / 6, c2y = p2[1] - (p3[1] - p1[1]) / 6;
      d += ` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2[0]} ${p2[1]}`;
    }
    return d;
  }

  const vPts  = vertus.map((v, i) => [sx(i), sy(v)]);
  const spPts = sp.map((v, i) => [sx(i), sy(v)]);

  const vPath = smooth(vPts);
  const vEl = document.getElementById("vertus");
  vEl.setAttribute("d", vPath);
  document.getElementById("sp").setAttribute("d", smooth(spPts));
  document.getElementById("area").setAttribute("d",
    vPath + ` L ${X1} ${Y0} L ${X0} ${Y0} Z`);

  // gridlines + y-axis labels (0,10,...,60)
  const grid = document.getElementById("grid");
  for (let v = 0; v <= VMAX; v += 10) {
    const y = sy(v);
    const ln = document.createElementNS("http://www.w3.org/2000/svg", "line");
    ln.setAttribute("class", "grid");
    ln.setAttribute("x1", X0); ln.setAttribute("x2", X1);
    ln.setAttribute("y1", y);  ln.setAttribute("y2", y);
    grid.appendChild(ln);
    const tx = document.createElementNS("http://www.w3.org/2000/svg", "text");
    tx.setAttribute("class", "axis-label");
    tx.setAttribute("x", X0 - 14); tx.setAttribute("y", y + 7);
    tx.setAttribute("text-anchor", "end");
    tx.textContent = v + "%";
    grid.appendChild(tx);
  }

  // x-axis month labels
  const xl = document.getElementById("xlabels");
  months.forEach((m, i) => {
    const tx = document.createElementNS("http://www.w3.org/2000/svg", "text");
    tx.setAttribute("class", "axis-label");
    tx.setAttribute("x", sx(i)); tx.setAttribute("y", Y0 + 44);
    tx.setAttribute("text-anchor", "middle");
    tx.textContent = m;
    xl.appendChild(tx);
  });

  // line draw setup
  const vLen = vEl.getTotalLength();
  vEl.style.strokeDasharray = vLen;
  vEl.style.strokeDashoffset = vLen;
  const spEl = document.getElementById("sp");   // revealed left-to-right via the same clip as the area

  const revealRect = document.getElementById("revealRect");
  const bigNum = document.getElementById("bigNum");
  const FINAL = 51.15, DUR = 2200;

  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

  function run() {
    const start = performance.now();
    function frame(now) {
      const t = Math.min((now - start) / DUR, 1);
      const e = easeOutCubic(t);
      vEl.style.strokeDashoffset = vLen * (1 - e);
      revealRect.setAttribute("width", (X1 - X0) * e);
      bigNum.textContent = "+" + (FINAL * e).toFixed(2) + "%";
      if (t < 1) requestAnimationFrame(frame);
      else bigNum.textContent = "+" + FINAL.toFixed(2) + "%";
    }
    requestAnimationFrame(frame);
  }

  // play when scrolled into view (replays each time it re-enters)
  const card = document.getElementById("card");
  const io = new IntersectionObserver((entries) => {
    entries.forEach(en => { if (en.isIntersecting) run(); });
  }, { threshold: 0.4 });
  io.observe(card);
})();
</script>
</body>
</html>
